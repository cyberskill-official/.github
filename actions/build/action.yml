---
name: 🛠️ Build
description: This action builds the project
inputs:
  BUILD_ARTIFACT_NAME:
    description: Name of the build artifact
    required: false
  BUILD_PATH:
    description: Paths to upload (newline-separated)
    required: false
    default: |
      dist
      build
  RETENTION_DAYS:
    description: Number of days to retain the artifact
    required: false
    default: "7"
runs:
  using: "composite"
  steps:
    - name: Build project
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${PM_RUN:-}" ]]; then
          echo "::error::PM_RUN is not set. Run the 'env-deps' action before 'build'."
          exit 1
        fi
        # shellcheck disable=SC2086
        ${{ env.PM_RUN }} --if-present build

    - name: Upload build or dist folder as artifact
      if: ${{ inputs.BUILD_ARTIFACT_NAME != '' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ${{ inputs.BUILD_ARTIFACT_NAME }}
        path: ${{ inputs.BUILD_PATH }}
        retention-days: ${{ inputs.RETENTION_DAYS }}
        if-no-files-found: error
