---
name: 🛠️ Lint
description: This action lints the project
inputs:
  SKIP_YAML_LINT:
    description: "Skip the YAML lint step (default: false)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Lint YAML
      if: ${{ inputs.SKIP_YAML_LINT != 'true' }}
      # ⚠️ INTENTIONAL: Uses @main instead of SHA pin because this references
      # an action in the same repo — SHA pinning would require updating on every
      # commit. The CI pin-checker excludes cyberskill-official/.github/ refs.
      uses: cyberskill-official/.github/actions/lint-yaml@d2ae633240d05d94a798e6a792cae4d0edfb4655  # main

    - name: Run lint
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${PM_RUN:-}" ]]; then
          echo "::error::PM_RUN is not set. Run the 'env-deps' action before 'lint'."
          exit 1
        fi
        # shellcheck disable=SC2086
        ${{ env.PM_RUN }} --if-present lint
